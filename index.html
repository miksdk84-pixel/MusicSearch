<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miks Music Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Sort baggrund med Mlogo.png som synlig baggrund */
        body { 
            background-color: #000000;
            /* Vi bruger en lidt lysere gradient (0.5 i stedet for 0.7), så logoet ses tydeligere */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('Mlogo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        .glass { 
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(236, 72, 153, 0.25);
        }

        .neon-text {
            color: #ec4899;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.8);
        }

        #suggestions {
            position: absolute;
            width: 100%;
            z-index: 100;
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid rgba(236, 72, 153, 0.5);
            border-radius: 1rem;
            margin-top: 5px;
            max-height: 250px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 1rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 600;
        }

        .suggestion-item:hover {
            background: rgba(236, 72, 153, 0.3);
            color: #ec4899;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-xl mx-auto">
        
        <header class="py-12 text-center">
            <h1 class="text-7xl font-black italic tracking-tighter uppercase neon-text">MIKS</h1>
            <div id="status" class="text-[9px] text-orange-500 mt-2 tracking-[0.4em] font-bold uppercase opacity-80 text-shadow">AI Engine Loaded</div>
        </header>

        <div class="relative mb-10">
            <div class="relative group">
                <input type="text" id="search" placeholder="Søg kunstner..." 
                autocomplete="off"
                class="relative w-full p-6 rounded-2xl glass outline-none text-xl transition-all text-white placeholder:text-gray-700 border border-white/10 focus:border-pink-500">
                <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-orange-500"></i>
            </div>
            <div id="suggestions" class="hidden"></div>
        </div>

        <div id="results" class="grid gap-3"></div>
    </div>

    <script>
        let sange = [];
        let kunstnere = [];

        fetch('./musik.json')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                sange = lines
                    .filter(line => line.trim().length > 0 && !line.startsWith('._'))
                    .map(line => {
                        const parts = line.split('\t');
                        let rawTitle = parts[0] || "Ukendt";
                        let cleanTitle = rawTitle.replace('.mp3', '').split('/').pop();
                        let folderName = parts[3] ? parts[3].split('/').filter(Boolean).pop() : "Samling";
                        
                        return {
                            title: cleanTitle,
                            artist: folderName,
                            genre: parts[1] || "Musik",
                            key: parts[2] || ""
                        };
                    });

                 kunstnere = [...new Set(sange.map(s => s.artist))].sort();
                 document.getElementById('status').innerText = sange.length + " TRACKS READY";
                 render(sange.slice(0, 15));
            });

        const searchInput = document.getElementById('search');
        const suggestionsDiv = document.getElementById('suggestions');
        const resultsDiv = document.getElementById('results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            if (query.length >= 1) {
                const matches = kunstnere.filter(k => k.toLowerCase().includes(query)).slice(0, 10);
                if (matches.length > 0) {
                    suggestionsDiv.innerHTML = matches.map(m => `<div class="suggestion-item">${m}</div>`).join('');
                    suggestionsDiv.classList.remove('hidden');
                } else {
                    suggestionsDiv.classList.add('hidden');
                }
            } else {
                suggestionsDiv.classList.add('hidden');
            }

            const filtered = sange.filter(s => 
                s.title.toLowerCase().includes(query) || 
                s.artist.toLowerCase().includes(query)
            ).slice(0, 50);
            render(filtered);
        });

        suggestionsDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('suggestion-item')) {
                const name = e.target.innerText;
                searchInput.value = name;
                suggestionsDiv.classList.add('hidden');
                render(sange.filter(s => s.artist === name));
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) suggestionsDiv.classList.add('hidden');
        });

        function render(list) {
            resultsDiv.innerHTML = list.map(s => `
                <div class="p-5 rounded-2xl glass flex items-center gap-5 border border-white/5 active:scale-95 transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-black flex flex-col items-center justify-center text-orange-500 font-mono text-[10px] font-bold border border-white/10 group-hover:border-pink-500/50">
                        ${s.key || '♫'}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold text-white truncate text-lg group-hover:text-pink-500 transition-colors">${s.title}</div>
                        <div class="text-[11px] text-gray-500 truncate uppercase tracking-widest">${s.artist}</div>
                    </div>
                    <i class="fas fa-play text-[10px] text-gray-800 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
