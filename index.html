<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto text-center">
        <h1 class="py-8 text-rose-500 text-4xl font-black uppercase tracking-tighter">Music Stream</h1>
        
        <input type="text" id="search" placeholder="Søg i 10.000 sange..." 
        class="w-full p-5 rounded-2xl glass outline-none mb-4 text-white">

        <div id="status" class="text-xs text-gray-500 mb-6">Forbinder...</div>
        <div id="results" class="grid gap-2"></div>
    </div>

    <script>
        let sange = [];

        // Vi henter din fil som rå tekst
        fetch('musik.json')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                sange = lines.map(line => {
                    // Vi splitter linjen op i bidder
                    const bidder = line.split(/\s{2,}/); // Splitter ved store mellemrum
                    return {
                        titel: bidder[0] || "",
                        info: bidder[1] || ""
                    };
                }).filter(s => s.titel.length > 1 && !s.titel.startsWith('._'));

                document.getElementById('status').innerText = sange.length + " SANGE KLAR";
                render(sange.slice(0, 30));
            })
            .catch(err => {
                document.getElementById('status').innerText = "FEJL: Kan ikke finde filen!";
            });

        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = sange.filter(s => s.titel.toLowerCase().includes(q)).slice(0, 50);
            render(filtered);
        });

        function render(list) {
            document.getElementById('results').innerHTML = list.map(s => `
                <div class="p-4 rounded-xl glass text-left">
                    <div class="font-bold">${s.titel}</div>
                    <div class="text-xs text-gray-400">${s.info}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
