<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miks Musik AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-xl mx-auto">
        <header class="py-8 text-center text-rose-500 text-4xl font-black italic tracking-tighter">MUSIC STREAM</header>

        <div class="sticky top-4 z-50 mb-6">
            <input type="text" id="search" placeholder="Søg i sange eller kunstnere..." 
            class="w-full p-5 rounded-3xl glass outline-none shadow-2xl focus:ring-2 ring-rose-500/50 text-lg transition-all">
        </div>

        <div id="results" class="grid gap-3 text-center py-10 text-gray-500 italic">Henter musikken...</div>
    </div>

    <script>
        let sange = [];
        
        // Vi henter filen. Tjek at den hedder musik.json på GitHub!
        fetch('musik.json')
            .then(res => res.json())
            .then(data => {
                // Håndterer hvis TableConvert har lagt data i en under-mappe
                sange = Array.isArray(data) ? data : (data.data || Object.values(data)[0]);
                console.log("Sange hentet:", sange.length);
                render(sange.slice(0, 50));
            })
            .catch(err => {
                document.getElementById('results').innerHTML = "Kunne ikke finde musik.json. Tjek filnavnet på GitHub!";
            });

        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (query.length < 2) { render(sange.slice(0, 50)); return; }

            const filtered = sange.filter(s => {
                return Object.values(s).some(val => String(val).toLowerCase().includes(query));
            }).slice(0, 100);

            render(filtered);
        });

        function render(list) {
            const resultsDiv = document.getElementById('results');
            if (!list || list.length === 0) { resultsDiv.innerHTML = "Ingen sange fundet..."; return; }
            
            resultsDiv.innerHTML = list.map(s => {
                // Vi finder de rigtige felter automatisk
                const keys = Object.keys(s);
                const val1 = s.Title || s.title || s[keys[1]] || "Ukendt";
                const val2 = s.Artist || s.artist || s[keys[0]] || "Ukendt";
                const val3 = s.Key || s.key || s[keys[2]] || "";

                return `
                    <div class="p-5 rounded-2xl glass flex items-center gap-4 text-left">
                        <div class="w-12 h-12 rounded-xl bg-gray-800 flex items-center justify-center text-rose-400 font-bold text-xs shadow-inner">
                            ${val3}
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <div class="font-bold text-white truncate text-lg">${val1}</div>
                            <div class="text-sm text-gray-400 truncate">${val2}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
