<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miks 3D Music Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #000000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), url('Mlogo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            perspective: 1000px; /* Gør 3D muligt */
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 3D Effekt ved tryk */
        .glass:active {
            transform: rotateX(15deg) translateY(-5px) scale(0.98);
            background: rgba(236, 72, 153, 0.1);
            border-color: #ec4899;
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.3);
        }

        .neon-text {
            color: #ec4899;
            text-shadow: 0 0 20px rgba(236, 72, 153, 0.8);
        }

        /* Skjuler scrollbar men bevarer funktionen */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .status-pill {
            background: rgba(0, 0, 0, 0.5);
            border: 1px border rgba(249, 115, 22, 0.3);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 8px;
            color: #f97316;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="p-4 pb-24 no-scrollbar">
    <div class="max-w-xl mx-auto">
        
        <header class="py-12 text-center">
            <h1 class="text-7xl font-black italic tracking-tighter uppercase neon-text">MIKS</h1>
            <div class="flex justify-center mt-2">
                <div id="status" class="status-pill uppercase font-bold">3D ENGINE LOADING...</div>
            </div>
        </header>

        <div class="relative mb-12">
            <input type="text" id="search" placeholder="Søg i samlingen..." 
            autocomplete="off"
            class="w-full p-6 rounded-3xl glass outline-none text-xl text-white placeholder:text-gray-600 shadow-2xl">
            <i class="fas fa-cube absolute right-6 top-1/2 -translate-y-1/2 text-pink-500 opacity-50"></i>
        </div>

        <div id="results" class="grid gap-4"></div>
    </div>

    <script>
        let sange = [];

        fetch('./musik.json')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                sange = lines
                    .filter(line => line.trim().length > 0 && !line.startsWith('._'))
                    .map(line => {
                        const parts = line.split('\t');
                        let title = (parts[0] || "Ukendt").replace('.mp3', '').split('/').pop();
                        let artist = parts[3] ? parts[3].split('/').filter(Boolean).pop() : "Miks";
                        return { title, artist, key: parts[2] || "3D" };
                    });
                 document.getElementById('status').innerText = "3D DATA READY • " + sange.length + " TRACKS";
                 render(sange.slice(0, 15));
            });

        const searchInput = document.getElementById('search');
        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = sange.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)).slice(0, 50);
            render(filtered);
        });

        function render(list) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = list.map((s, index) => `
                <div class="p-6 rounded-[2rem] glass flex items-center gap-6" style="transition-delay: ${index * 50}ms">
                    <div class="w-14 h-14 rounded-2xl bg-black/80 flex items-center justify-center text-pink-500 font-bold border border-white/5 shadow-inner">
                        ${s.key}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold text-white truncate text-xl">${s.title}</div>
                        <div class="text-xs text-orange-500/70 font-bold uppercase tracking-widest mt-1">${s.artist}</div>
                    </div>
                    <div class="opacity-20 text-[8px] font-mono">00${index + 1}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
