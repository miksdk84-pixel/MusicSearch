<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Stream AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e1b4b, #020617); 
            color: white; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #f43f5e; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="py-10 text-center relative">
            <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-64 h-64 bg-rose-500/10 blur-[100px]"></div>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase text-white drop-shadow-2xl">
                MUSIC<span class="text-rose-500">STREAM</span>
            </h1>
            <div id="status" class="text-[10px] text-rose-500/60 mt-2 tracking-[0.3em] font-bold uppercase">System Booting...</div>
        </header>

        <div class="sticky top-6 z-50 mb-10">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-rose-500 to-purple-600 rounded-3xl blur opacity-25 group-focus-within:opacity-50 transition duration-1000"></div>
                <input type="text" id="search" placeholder="Hvad vil du lytte til?" 
                class="relative w-full p-6 rounded-2xl bg-black/40 glass outline-none text-xl transition-all text-white placeholder:text-gray-500 border-none">
                <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-rose-500"></i>
            </div>
        </div>

        <div id="results" class="grid gap-4"></div>
    </div>

    <script>
        let sange = [];

        fetch('./musik.json')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                sange = lines
                    .filter(line => line.trim().length > 0 && !line.startsWith('._'))
                    .map(line => {
                        const parts = line.split('\t');
                        // Vi renser titlen for ".mp3" og stier
                        let rawTitle = parts[0] || "Ukendt";
                        let cleanTitle = rawTitle.replace('.mp3', '').split('/').pop();
                        
                        return {
                            fullTitle: cleanTitle,
                            genre: parts[1] || "Musik",
                            key: parts[2] || "",
                            path: parts[3] || ""
                        };
                    });

                document.getElementById('status').innerText = "AI DATABASE READY • " + sange.length + " TRACKS";
                render(sange.slice(0, 20));
            });

        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if (q.length < 2) { render(sange.slice(0, 20)); return; }
            
            const filtered = sange.filter(s => 
                s.fullTitle.toLowerCase().includes(q) || 
                s.path.toLowerCase().includes(q)
            ).slice(0, 50);
            render(filtered);
        });

        function render(list) {
            const resultsDiv = document.getElementById('results');
            if (list.length === 0) { 
                resultsDiv.innerHTML = "<div class='text-center py-20 opacity-30'>Ingen resultater fundet i din samling...</div>"; 
                return; 
            }
            
            resultsDiv.innerHTML = list.map((s, i) => `
                <div class="p-4 rounded-2xl glass flex items-center gap-5 border border-white/5 hover:bg-white/5 active:scale-95 transition-all group">
                    <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-gray-800 to-black flex flex-col items-center justify-center text-rose-500 border border-white/10 group-hover:border-rose-500/50 transition-colors">
                        <span class="text-[10px] font-bold opacity-50">${s.key || '♫'}</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold text-white truncate text-lg group-hover:text-rose-400 transition-colors">${s.fullTitle}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[10px] px-2 py-0.5 rounded-full bg-rose-500/10 text-rose-400 font-bold uppercase tracking-wider">${s.genre}</span>
                            <span class="text-[10px] text-gray-500 truncate">${s.path.split('/').slice(-2, -1)}</span>
                        </div>
                    </div>
                    <div class="text-gray-600 group-hover:text-rose-500 transition-colors">
                        <i class="fas fa-play-circle text-2xl"></i>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
